services:
  backend:
    build: ./backend
    container_name: mirrorverse-backend
    env_file:
      - .env
    environment:
      # Inside the compose network the MiroFish service hostname replaces localhost
      - MIROFISH_URL=http://mirofish:5001
    ports:
      - "8000:8000"
    depends_on:
      - mirofish
    restart: unless-stopped

  mirofish:
    # Prebuilt image ghcr.io/666ghj/mirofish:latest has no linux/arm64 manifest;
    # building locally works on both Apple Silicon and x86.
    build: ./mirofish
    image: mirofish:local
    container_name: mirofish
    env_file:
      - ./mirofish/.env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./mirofish/backend/uploads:/app/backend/uploads
